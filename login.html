<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AmanOS Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0C0C0E;
font-family:sans-serif;
color:white;
}

/* main card */

.card{
width:320px;
padding:40px;
border-radius:14px;
background:#141418;
border:1px solid #26262C;
text-align:center;
}

/* title */

.title{
font-size:26px;
font-weight:700;
margin-bottom:6px;
}

/* subtitle */

.sub{
font-size:12px;
color:#888;
margin-bottom:20px;
}

/* quote */

.quote{
font-size:13px;
color:#C9F566;
margin-bottom:25px;
line-height:1.5;
}

/* input */

input{
width:100%;
padding:11px;
border-radius:8px;
border:none;
background:#1A1A22;
color:white;
margin-bottom:12px;
}

/* button */

button{
width:100%;
padding:11px;
border-radius:8px;
border:none;
background:#C9F566;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<div class="title">AmanOS</div>
<div class="sub">Track your discipline</div>

<div class="quote" id="quote"></div>

<input id="mobile" placeholder="Enter mobile number">

<button onclick="login()">Continue</button>

</div>

<script>

/* motivation quotes */

const quotes = [

"Discipline beats motivation.",
"Small daily wins build unstoppable momentum.",
"Your future body is built today.",
"Consistency is the real superpower.",
"Greatness is built on boring daily habits.",
"Do today what others won't.",
"Progress > perfection.",
"One more rep. One more hour.",
"Your habits define your destiny.",
"Stay hard."

]

/* show random quote */

const random = quotes[Math.floor(Math.random()*quotes.length)]

document.getElementById("quote").innerText = random


/* login function */

async function login(){

const mobile = document.getElementById("mobile").value

const res = await fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({mobile})
})

const data = await res.json()

localStorage.setItem("userId",data.userId)

window.location="index.html"

}

</script>

</body>
</html>
