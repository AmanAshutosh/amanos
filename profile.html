<!DOCTYPE html>
<html>
<head>
<title>AmanOS Profile</title>
<link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="card">

<h2>Your Profile</h2>

<input id="name" placeholder="Name" required>

<input id="age" type="number" min="10" max="100" placeholder="Age" required>

<input id="height" type="number" min="100" max="250" placeholder="Height (cm)" required>

<input id="weight" type="number" min="30" max="200" placeholder="Weight (kg)" required>

<input id="mobile" type="tel" readonly>

<button onclick="saveProfile()">Save</button>

</div>

<script src="profile.js"></script>

</body>
</html>
